name: Snapshot Health Check

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

concurrency:
  group: huayuguide-rate-health
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run health check
        run: python scripts/health_check.py --max-age-minutes 240
